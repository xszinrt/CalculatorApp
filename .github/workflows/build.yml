name: Build Signed APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Sign APK (debug key)
        run: |
          # إنشاء مفتاح تصحيح تلقائي
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=Debug" -storepass android -keypass android
          
          # توقيع APK
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore debug.keystore -storepass android -keypass android app/build/outputs/apk/release/app-release-unsigned.apk androiddebugkey
          
          # تحسين وتحضير APK الموقع
          cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/calculator-signed.apk
      
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-signed
          path: app/build/outputs/apk/release/calculator-signed.apk
